# Bloco para o nginx EXISTENTE da VPS rotear IP/openboard -> container do OpenBoard.
# Coloque DENTRO do server { ... } que já atende o IP (porta 80).
# O app usa basePath /openboard e remove a barra final (Next, trailingSlash=false),
# então AMBAS as locations apenas PROXIAM (sem redirect no nginx) e deixam o app
# decidir os redirects — senão dá ERR_TOO_MANY_REDIRECTS (loop /openboard <-> /openboard/).
#
# IMPORTANTE: proxy_pass SEM barra final (repassa o prefixo /openboard; é basePath).

location /openboard/ {
    proxy_pass http://127.0.0.1:3001;   # ajuste pra APP_PORT do .env.production
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
}

# Entrada sem barra: NÃO redirecionar aqui — proxyar e deixar o app fazer o 307.
location = /openboard {
    proxy_pass http://127.0.0.1:3001;   # mesma APP_PORT
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
}
