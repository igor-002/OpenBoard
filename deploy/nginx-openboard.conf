# Bloco para o nginx EXISTENTE da VPS rotear IP/openboard -> container do OpenBoard.
# Coloque DENTRO do server { ... } que já atende o IP (porta 80).
# O app usa basePath /openboard, então o prefixo é repassado como está (sem reescrever).

location /openboard/ {
    proxy_pass http://127.0.0.1:3001;   # APP_PORT do .env.production
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
}

# Redireciona /openboard (sem barra) -> /openboard/
location = /openboard {
    return 308 /openboard/;
}
