# OpenBoard — produção (VPS). Subir com:
#   docker compose --env-file .env.production -f compose.prod.yml up -d --build
services:
  db:
    image: postgres:16-alpine
    container_name: openboard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Aplica migrations e encerra (one-shot). Tem node_modules completo (CLI Prisma).
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: openboard-migrate
    restart: "no"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: openboard-app
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
      AUTH_SECRET: ${AUTH_SECRET}
      NODE_ENV: production
      # URL pública (ex.: https://crm.opensuite.com.br). Usada nos links de TV e
      # de reset de senha. Sem isso cai no host da request.
      APP_URL: ${APP_URL:-}
      # Encurtador de links (aba Links & QR): base das URLs curtas + salt do hash de IP.
      SHORT_BASE_URL: ${SHORT_BASE_URL:-}
      SHORT_IP_SALT: ${SHORT_IP_SALT:-}
      # Cookie Secure só com HTTPS. Em HTTP (IP) deixe false, senão a sessão não persiste.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # Chave AES p/ criptografar o token do Instagram em repouso (openssl rand -base64 32).
      TOKEN_ENC_KEY: ${TOKEN_ENC_KEY:-}
      # Painel de TV. Botão "Abrir TV" gera link assinado; TV_TOKEN fixo é fallback legado.
      TV_TOKEN: ${TV_TOKEN:-}
      TV_WORKSPACE_ID: ${TV_WORKSPACE_ID:-}
      # Comercial / IXCSoft (server-only). Sem IXC_TOKEN o módulo fica "não configurado".
      IXC_BASE_URL: ${IXC_BASE_URL:-}
      IXC_PROXY_URL: ${IXC_PROXY_URL:-}
      IXC_TOKEN: ${IXC_TOKEN:-}
      IXC_FILIAIS: ${IXC_FILIAIS:-}
      IXC_CAMPO_STATUS_CONTRATO: ${IXC_CAMPO_STATUS_CONTRATO:-}
      # Webhook de ingest de leads do chat de atendimento (POST /api/comercial/leads).
      LEADS_INGEST_TOKEN: ${LEADS_INGEST_TOKEN:-}
      # Análise IA da conversa (OpenAI). Sem OPENAI_API_KEY o botão de análise fica off.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_PRICE_IN_PER_1M: ${OPENAI_PRICE_IN_PER_1M:-}
      OPENAI_PRICE_OUT_PER_1M: ${OPENAI_PRICE_OUT_PER_1M:-}
    # Banco GeoLite2 baixado no host (npm run geoip:update + cron semanal).
    # O app lê geoip/GeoLite2-City.mmdb relativo ao cwd (/app) e recarrega por mtime.
    volumes:
      - ./geoip:/app/geoip:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Publica só na interface local (127.0.0.1) — o nginx da VPS faz o proxy
    # (crm.opensuite.com.br → raiz). App responde em http://127.0.0.1:${APP_PORT}/
    ports:
      - "127.0.0.1:${APP_PORT:-3001}:3000"

volumes:
  pgdata:
